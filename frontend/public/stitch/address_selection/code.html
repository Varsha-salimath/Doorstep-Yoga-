<!DOCTYPE html><html class="light" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;family=Source+Serif+4:wght@500;600;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .map-gradient-overlay {
            background: linear-gradient(to bottom, rgba(251, 249, 244, 0.9) 0%, rgba(251, 249, 244, 0) 20%, rgba(251, 249, 244, 0) 80%, rgba(251, 249, 244, 1) 100%);
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #e4e2dd;
            border-radius: 10px;
        }

<script id="tailwind-config">

            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "error": "#ba1a1a",
                        "on-primary-fixed": "#0f1f12",
                        "on-tertiary-fixed-variant": "#574500",
                        "on-secondary-fixed-variant": "#703720",
                        "on-error": "#ffffff",
                        "surface-container-high": "#eae8e3",
                        "surface-container-low": "#f5f3ee",
                        "on-secondary-container": "#7a3e27",
                        "on-error-container": "#93000a",
                        "background": "#fbf9f4",
                        "on-background": "#1b1c19",
                        "primary-container": "#677967",
                        "outline": "#747872",
                        "inverse-primary": "#b8ccb7",
                        "inverse-on-surface": "#f2f1ec",
                        "inverse-surface": "#30312e",
                        "outline-variant": "#c3c8c0",
                        "on-primary": "#ffffff",
                        "secondary": "#8d4d35",
                        "surface-container": "#f0eee9",
                        "on-surface": "#1b1c19",
                        "tertiary-fixed": "#ffe088",
                        "surface-container-lowest": "#ffffff",
                        "on-primary-fixed-variant": "#3a4b3b",
                        "on-secondary": "#ffffff",
                        "surface-bright": "#fbf9f4",
                        "surface-variant": "#e4e2dd",
                        "primary-fixed": "#d4e8d2",
                        "surface": "#fbf9f4",
                        "primary-fixed-dim": "#b8ccb7",
                        "on-secondary-fixed": "#380d00",
                        "tertiary-fixed-dim": "#e9c349",
                        "on-tertiary-fixed": "#241a00",
                        "secondary-container": "#ffad8f",
                        "on-primary-container": "#f7fff3",
                        "on-tertiary-container": "#4e3d00",
                        "on-tertiary": "#ffffff",
                        "surface-tint": "#516352",
                        "primary": "#4e604f",
                        "tertiary-container": "#cca72f",
                        "surface-container-highest": "#e4e2dd",
                        "surface-dim": "#dbdad5",
                        "secondary-fixed": "#ffdbce",
                        "on-surface-variant": "#434842",
                        "tertiary": "#735c00",
                        "error-container": "#ffdad6",
                        "secondary-fixed-dim": "#ffb59a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "container-padding-mobile": "20px",
                        "gutter": "16px",
                        "section-gap": "48px",
                        "base": "8px",
                        "container-padding-desktop": "64px"
                    },
                    "fontFamily": {
                        "display-lg-mobile": ["\"Source Serif 4\""],
                        "headline-sm": ["\"Source Serif 4\""],
                        "body-lg": ["Plus Jakarta Sans"],
                        "display-lg": ["\"Source Serif 4\""],
                        "body-md": ["Plus Jakarta Sans"],
                        "headline-md": ["\"Source Serif 4\""],
                        "label-md": ["Plus Jakarta Sans"],
                        "label-sm": ["Plus Jakarta Sans"]

                    "fontSize": {

                        "headline-sm": ["24px", {"lineHeight": "32px", "fontWeight": "500"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                        "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "600"}],

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body-md overflow-hidden">
<!-- Top AppBar (from JSON guidance) -->
<header class="flex justify-between items-center px-container-padding-mobile py-base w-full z-50 fixed top-0 bg-background/90 backdrop-blur-md">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary" data-icon="location_on">location_on</span>
<h1 class="font-headline-sm text-headline-sm-mobile md:text-headline-sm text-primary">Set Your Doorstep Yoga Location</h1>
</div>
<button class="hover:opacity-80 transition-opacity active:scale-95 duration-200">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="close">close</span>
</button>
</header>
<main class="relative h-screen w-full pt-16 flex flex-col">
<!-- Map Background -->
<div class="absolute inset-0 z-0">
<div class="w-full h-full grayscale-[0.3] brightness-[1.05] contrast-[0.9]" data-location="New Delhi, India">
<!-- Simulated Map with Image Injection -->
<img class="w-full h-full object-cover" data-alt="A sophisticated, high-end digital map rendering of an urban residential neighborhood. The map uses a soft, organic minimalist color palette of cream, sage green, and muted terracotta. Streets are rendered in soft white, and parks are shown in delicate sage. The lighting is bright and airy, reflecting a premium wellness brand aesthetic. Subtle UI markers indicate nearby yoga studios and wellness centers." src="https://lh3.googleusercontent.com/aida-public/AB6AXuD_ecwtmRbo4rfbj2C4jUajip2TJOQ2jklCqadsju3mHmu_ecG6FT0FnoQdvb5D_YRc9n7Cc6vXio684ZHGnvgf3tXn6xqAJDHw67kncKGmD36hfww8Q8W7OQUYSSHj5SAvUuxlw4SkGXTNH_GlCuJNYBymw4G7xO5mvSbKiZXRdFl2G23V2fMuQnNpKKSse48TO0I8_a3NRExBq6n-O95p_iczDs6Ui-FMBLTCIp6OAnynuvymPIXUxjsWe333SYB7uQbhHWq8NIo">
</div>
<!-- Overlay to blend map into content -->
<div class="absolute inset-0 map-gradient-overlay pointer-events-none"></div>
</div>
<!-- Floating UI Elements -->
<div class="relative z-10 flex flex-col h-full px-container-padding-mobile pb-6 pointer-events-none">
<!-- Search Bar -->
<div class="mt-4 pointer-events-auto max-w-2xl mx-auto w-full">
<div class="relative flex items-center bg-surface-container-lowest shadow-sm rounded-xl p-1 border border-outline-variant/30" style="transform: translateY(0px); transition: transform 0.6s cubic-bezier(0.22, 1, 0.36, 1);">
<span class="material-symbols-outlined absolute left-4 text-outline" data-icon="search">search</span>
<input class="w-full pl-12 pr-4 py-3.5 bg-transparent border-none focus:ring-0 text-on-surface placeholder-on-surface-variant/60 font-body-md" placeholder="Search for area, street name..." type="text">
</div>
</div>
<div class="flex-grow"></div>
<!-- Bottom Sheet Container (Zepto-style interaction) -->
<div class="pointer-events-auto bg-surface-container-lowest rounded-t-[32px] shadow-[0px_-8px_40px_rgba(0,0,0,0.08)] p-6 md:max-w-2xl md:mx-auto w-full">
<!-- Pull indicator -->
<div class="w-12 h-1.5 bg-surface-variant rounded-full mx-auto mb-8"></div>
<!-- Detect Location Button -->
<button class="w-full flex items-center justify-center gap-3 bg-primary-container text-on-primary-container py-4 rounded-xl shadow-sm hover:opacity-90 active:scale-[0.98] transition-all mb-8">
<span class="material-symbols-outlined" data-icon="my_location" style="font-variation-settings: 'FILL' 1;">my_location</span>
<span class="font-label-md text-label-md">Detect my location</span>
</button>
<!-- Saved Addresses Section -->
<div>
<h2 class="font-label-md text-label-md text-on-surface-variant mb-4 uppercase tracking-wider">Saved Addresses</h2>
<div class="space-y-2 max-h-64 overflow-y-auto custom-scrollbar pr-2">
<!-- Home -->
<div class="flex items-center gap-4 p-4 rounded-xl hover:bg-surface-container-low transition-colors cursor-pointer border border-transparent hover:border-outline-variant/20 group">
<div class="w-12 h-12 rounded-full bg-secondary-fixed flex items-center justify-center text-on-secondary-fixed">
<span class="material-symbols-outlined" data-icon="home_wellness">home_filled</span>
</div>
<div class="flex-grow">
<p class="font-label-md text-label-md text-on-surface">Home</p>
<p class="text-label-sm text-on-surface-variant">B-12, Green Park Main, New Delhi</p>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary transition-colors" data-icon="chevron_right">chevron_right</span>
</div>
<!-- Office -->
<div class="flex items-center gap-4 p-4 rounded-xl hover:bg-surface-container-low transition-colors cursor-pointer border border-transparent hover:border-outline-variant/20 group">
<div class="w-12 h-12 rounded-full bg-primary-fixed flex items-center justify-center text-on-primary-fixed">
<span class="material-symbols-outlined" data-icon="work">work</span>
</div>
<div class="flex-grow">
<p class="font-label-md text-label-md text-on-surface">Office</p>
<p class="text-label-sm text-on-surface-variant">Cyber City, Phase 2, Gurugram</p>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary transition-colors" data-icon="chevron_right">chevron_right</span>
</div>
<!-- Add New -->
<div class="flex items-center gap-4 p-4 rounded-xl hover:bg-surface-container-low transition-colors cursor-pointer border border-dashed border-outline-variant/50 group">
<div class="w-12 h-12 rounded-full border border-outline-variant border-dashed flex items-center justify-center text-outline">
<span class="material-symbols-outlined" data-icon="add">add</span>
</div>
<div class="flex-grow">
<p class="font-label-md text-label-md text-primary">Add New Address</p>
</div>
</div>
</div>
</div>
<!-- Footer Action -->
<div class="mt-8 pt-6 border-t border-outline-variant/20">
<button class="w-full py-4 text-center text-primary font-label-md text-label-md hover:underline active:opacity-70 transition-all">
                        Enter Address Manually
                    </button>
</div>
</div>
</div>
</main>
<!-- Bottom Navigation (Suppressing based on 'Task-Focused' rule, but keeping for reference of layout flow if needed - hidden by default here) -->
<!-- The prompt implies a mandatory first step, so we suppress main nav to prioritize focus. -->
<script>
        // Micro-interaction for the search bar focus
        const searchInput = document.querySelector('input[type="text"]');
        const searchContainer = searchInput?.parentElement;

        searchInput?.addEventListener('focus', () => {
            searchContainer.classList.add('ring-2', 'ring-primary/20', 'border-primary');
        });

        searchInput?.addEventListener('blur', () => {
            searchContainer.classList.remove('ring-2', 'ring-primary/20', 'border-primary');
        });

        // Simple animation for the sheet on load
        window.addEventListener('DOMContentLoaded', () => {
            const sheet = document.querySelector('.bg-surface-container-lowest');
            sheet.style.transform = 'translateY(100%)';
            sheet.style.transition = 'transform 0.6s cubic-bezier(0.22, 1, 0.36, 1)';
            
            setTimeout(() => {
                sheet.style.transform = 'translateY(0)';
            }, 100);
        });
    </script>


</body></html>
