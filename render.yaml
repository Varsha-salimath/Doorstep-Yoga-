services:
  - type: web
    name: doorstep-yoga-api
    runtime: node
    rootDir: backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_ORIGIN
        sync: false
      - key: OTP_EXPOSE_IN_RESPONSE
        value: "false"
